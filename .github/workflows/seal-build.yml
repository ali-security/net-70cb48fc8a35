name: seal-build

on:
  push:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Build module-zip helper
        run: |
          set -euxo pipefail
          HELPER="$(mktemp -d)"
          cp "$GITHUB_WORKSPACE/.github/create_mod.go" "$HELPER/create_mod.go"
          cd "$HELPER"
          go mod init example.com/mod
          go get golang.org/x/mod@v0.24.0
          go build -o "$RUNNER_TEMP/create_mod" .
          echo "HELPER_BIN=$RUNNER_TEMP/create_mod" >> "$GITHUB_ENV"

      - name: Package module zip
        run: |
          set -euxo pipefail
          # Remove the seal-only .github dir so it does not leak into the zip.
          # x/mod zip.CreateFromDir descends into .github (only skips VCS dirs).
          rm -rf "$GITHUB_WORKSPACE/.github"
          mkdir -p "$RUNNER_TEMP/out"
          "$HELPER_BIN" golang.org/x/net v0.45.0 "$GITHUB_WORKSPACE" "$RUNNER_TEMP/out/v0.45.0.zip"
          ls -l "$RUNNER_TEMP/out"

      - name: Upload module zip
        uses: actions/upload-artifact@v4
        with:
          name: module-zip
          path: ${{ runner.temp }}/out/v0.45.0.zip
          if-no-files-found: error

      - name: Build and test
        run: |
          set -euxo pipefail
          go build ./...
          go test ./...
